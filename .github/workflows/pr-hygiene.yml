name: PR Hygiene

on:
  pull_request:
    types: [opened, edited]

jobs:
  validate-close-keywords:
    name: Validate PR body close-keyword syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check close-keyword syntax
        run: |
          # Read PR body from the GitHub event payload file. Using
          # $GITHUB_EVENT_PATH (a runner env var, always set) avoids putting
          # any ${{ github.event.pull_request.* }} expression in the YAML env:
          # block — which caused registration failures on push events because
          # GitHub's static context-availability validator rejects pull_request
          # context access in non-pull_request event contexts, even with || ''
          # fallbacks or job-level if: guards (#376 regression root cause).
          #
          # $GITHUB_EVENT_PATH is safe: it is set by the runner, not by user
          # input, so it is not subject to shell injection. The node -e invocation
          # reads the file and serialises the body field; any shell metacharacters
          # in the body remain inside the node process and are never evaluated
          # by bash.

          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "OK: Not a pull_request event -- skipping body check"
            exit 0
          fi

          PR_BODY=$(node -e "
            const e = require(process.env.GITHUB_EVENT_PATH);
            process.stdout.write(e.pull_request.body || '');
          ")

          # Pattern: match "closes #<num>" or "fixes #<num>" or "resolves #<num>"
          # followed by a comma and then ANOTHER issue ref WITHOUT a keyword.
          # Example: "closes #123, #456" -> FAIL (missing keyword on #456)
          # Example: "closes #123, closes #456" -> PASS (each has keyword)

          if printf '%s' "$PR_BODY" | grep -qiE '(closes|fixes|resolves)\s+#[0-9]+\s*,\s*#[0-9]+'; then
            echo "FAIL: PR body contains comma-list issue refs without per-issue keywords"
            echo ""
            echo "Issue: Found pattern like 'closes #123, #456'"
            echo "GitHub only auto-closes the FIRST issue in a comma list."
            echo "Other issues stay open and get re-ranked into future waves."
            echo ""
            echo "Fix: Use one keyword per issue:"
            echo "  Bad:  closes #123, #456, #789"
            echo "  Good: closes #123, closes #456, closes #789"
            exit 1
          fi

          echo "OK: PR body close-keyword syntax is clean"
