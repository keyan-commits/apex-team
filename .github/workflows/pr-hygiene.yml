name: PR Hygiene

on:
  pull_request:
    types: [opened, edited]

jobs:
  validate-close-keywords:
    name: Validate PR body close-keyword syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check close-keyword syntax
        # Guard: only run on pull_request events. The workflow is only triggered
        # by pull_request (see `on:` above), but GitHub also runs a registration
        # validation pass on every push that modifies this file. In that push
        # context github.event.pull_request is null, so the env-var expression
        # below would cause a validation failure (manifest as run name falling
        # back to the file path with 0 jobs). The `if:` guard short-circuits
        # the step in any non-PR context, and the `|| ''` defensive default
        # prevents the expression from rejecting during registration validation.
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          # PR_BODY is passed as an env var — the ${{ }} expansion happens at
          # YAML-render time into a quoted env assignment, so shell metacharacters
          # in the body (backticks, $, $(…), etc.) are never evaluated by bash.
          # printf '%s' avoids echo's backslash-interpretation on some bash versions.

          # Pattern: match "closes #<num>" or "fixes #<num>" or "resolves #<num>"
          # followed by a comma and then ANOTHER issue ref WITHOUT a keyword
          # Example: "closes #123, #456" is FAIL (missing keyword on #456)
          # Example: "closes #123, closes #456" is PASS (each has keyword)

          if printf '%s' "$PR_BODY" | grep -qiE '(closes|fixes|resolves)\s+#[0-9]+\s*,\s*#[0-9]+'; then
            echo "FAIL: PR body contains comma-list issue refs without per-issue keywords"
            echo ""
            echo "Issue: Found pattern like 'closes #123, #456'"
            echo "GitHub only auto-closes the FIRST issue in a comma list."
            echo "Other issues stay open and get re-ranked into future waves."
            echo ""
            echo "Fix: Use one keyword per issue:"
            echo "  Bad:  closes #123, #456, #789"
            echo "  Good: closes #123, closes #456, closes #789"
            exit 1
          fi

          echo "OK: PR body close-keyword syntax is clean"
