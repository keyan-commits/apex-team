name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint --max-warnings 0

      - name: Dependency audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Type check
        run: pnpm type-check

      - name: Tests
        run: pnpm test:run

  actionlint:
    name: "actionlint — workflow lint (shell-injection + syntax)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"
          cache: false

      - name: "Install actionlint v1.7.12 (pinned via go install)"
        # Pinned to the exact commit SHA at tag v1.7.12 (supply-chain hygiene).
        # go install with a @<SHA> suffix resolves the exact commit — not a floating tag.
        # Tag v1.7.12 resolves to commit 914e7df21a07ef503a81201c76d2b11c789d3fca.
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          actionlint --version

      - name: "Run actionlint on .github/workflows/"
        # Problem matcher produces inline PR annotations for findings.
        # Catches: shell-injection (${{ ... }} in run: outside env:),
        # deprecated action versions, expression type errors, syntax errors.
        # Wave 112 (#391): catches the ux-gate-check.yml injection pattern
        # fixed this wave — prevents regression of the three repeated instances.
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          actionlint -color .github/workflows/*.yml

  merge-driver-test:
    name: F1 — union-merge fitness (HANDOFF.md no conflict markers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Test union-merge driver on HANDOFF.md
        run: |
          set -e

          # 1. Verify .gitattributes exists in this checkout and configures union for HANDOFF.md
          if ! grep -q "HANDOFF.md.*merge=union" .gitattributes; then
            echo "ERROR: .gitattributes missing or HANDOFF.md not configured for merge=union"
            exit 1
          fi

          # 2. Set up an isolated test repo + copy THIS checkout's .gitattributes
          ATTRIBUTES_SRC="$(pwd)/.gitattributes"
          TEST_REPO="${RUNNER_TEMP:-/tmp}/merge_test_$$"
          mkdir -p "$TEST_REPO"
          cp "$ATTRIBUTES_SRC" "$TEST_REPO/.gitattributes"
          cd "$TEST_REPO"
          git -c init.defaultBranch=main init -q
          git config user.email "ci@apex-team.local"
          git config user.name "CI"

          # 3. Base HANDOFF.md
          cat > HANDOFF.md <<'EOF'
          ## ⏭️ NOW — 2026-06-01 (Wave 88)
          Wave 88 work in progress.

          ## ⏭️ PREV — 2026-05-31 (Wave 87)
          Wave 87 completed.
          EOF
          git add .gitattributes HANDOFF.md
          git commit -q -m "base"

          # 4. Branch "ours" prepends Wave 90 NOW block
          git checkout -q -b ours
          cat > HANDOFF.md <<'EOF'
          ## ⏭️ NOW — 2026-06-02 (Wave 90)
          Wave 90 work: Feature A.

          ## ⏭️ PREV — 2026-06-01 (Wave 88)
          Wave 88 work in progress.

          ## ⏭️ PREV — 2026-05-31 (Wave 87)
          Wave 87 completed.
          EOF
          git add HANDOFF.md
          git commit -q -m "wave 90"

          # 5. Branch "theirs" prepends Wave 89 NOW block
          git checkout -q main
          git checkout -q -b theirs
          cat > HANDOFF.md <<'EOF'
          ## ⏭️ NOW — 2026-06-02 (Wave 89)
          Wave 89 work: Feature B.

          ## ⏭️ PREV — 2026-06-01 (Wave 88)
          Wave 88 work in progress.

          ## ⏭️ PREV — 2026-05-31 (Wave 87)
          Wave 87 completed.
          EOF
          git add HANDOFF.md
          git commit -q -m "wave 89"

          # 6. Attempt merge. merge=union is git's built-in strategy — no driver
          #    config needed; .gitattributes alone activates it.
          git checkout -q ours
          if ! git merge --no-edit theirs; then
            echo "ERROR: merge failed (expected union to auto-resolve)"
            cat HANDOFF.md
            exit 1
          fi

          # 7. Verify no conflict markers in result
          if grep -E "^<<<<<<<|^>>>>>>>|^=======$" HANDOFF.md; then
            echo "ERROR: conflict markers found in merged HANDOFF.md"
            cat HANDOFF.md
            exit 1
          fi

          # 8. Verify both NOW blocks survived the union (Wave 89 + Wave 90)
          grep -q "Wave 89" HANDOFF.md || { echo "ERROR: Wave 89 block missing"; exit 1; }
          grep -q "Wave 90" HANDOFF.md || { echo "ERROR: Wave 90 block missing"; exit 1; }

          echo "✓ Union merge completed without conflict markers; both NOW blocks preserved"
