name: Pass Verdict Format Check

# Verifies ADR-018 canonical PASS-verdict format.
#
# Trigger matrix:
#   pull_request  (paths: coordination/handoffs/**)
#     → format-check job (hard-fail on format violations)
#     → ttl-check job    (soft-warn on overdue PR #0 placeholders)
#   push to main
#     → ttl-check job only (no PR context; format-check is skipped)
#   schedule (nightly 06:00 UTC)
#     → ttl-check job only (ambient sweep; format-check is skipped)
#
# Two check jobs:
#   1. verdict-format-check — every Wave-111+ verdict heading in any
#      coordination/handoffs/*.md file must match the ADR-018 canonical
#      regex. Line-by-line output on failure. PR context required — runs
#      on pull_request events only.
#
#   2. placeholder-ttl-check — flag `PR #0` placeholder verdicts whose
#      wrapping PR merged >1h ago. Soft-fail (warning, non-blocking) —
#      placeholders are legitimate pre-merge; this catches missed
#      backfills. Runs on ALL triggers (PR + push + schedule).
#
# Allowlists (format-check only):
#   - PRs whose title/body contain [skip-verdict-check] (emergency override)
#
# Spec: architecture/decisions/ADR-018-pass-verdict-format.md

on:
  pull_request:
    branches: ["**"]
    paths:
      - "coordination/handoffs/**"
  push:
    branches: ["main"]
  schedule:
    # Nightly at 06:00 UTC — ambient sweep to catch missed backfills.
    - cron: "0 6 * * *"

# Prevent cron and push from racing on the TTL check.
# cancel-in-progress: false keeps the older run alive (it may already be
# reporting; cancelling would hide the warning).
concurrency:
  group: "ttl-check"
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  verdict-format-check:
    name: "ADR-018 — verdict format check (PR only)"
    runs-on: ubuntu-latest
    # Format check requires PR context (title/body for skip-override, PR number
    # for the canonical heading match). Do not run on push or schedule.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Install gh CLI (already present on ubuntu-latest; verify)"
        run: gh --version

      - name: "ADR-018 verdict format check"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # --- Emergency override ---
          # PR_TITLE/PR_BODY passed via env: to prevent shell injection on
          # special characters (backticks, $, code-fences). Original
          # injection bug fixed in #378; same anti-pattern caught again here.
          if printf '%s%s' "$PR_TITLE" "$PR_BODY" | grep -qF '[skip-verdict-check]'; then
            echo "SKIP: [skip-verdict-check] override present in PR title/body."
            exit 0
          fi

          HANDOFFS_DIR="coordination/handoffs"
          FORMAT_REQUIRED_FROM_WAVE=111
          # ADR-018 canonical regex for the heading line (em-dash is U+2014)
          # ^### Wave-NNN (PASS|REVISE|FAIL) verdict — PR #N — SHA <40hex>$
          # shellcheck disable=SC2034  # used downstream via grep -qE "${CANONICAL_PATTERN}"
          CANONICAL_PATTERN='^### Wave-[0-9]{1,4} (PASS|REVISE|FAIL) verdict — PR #[0-9]{1,6} — SHA [0-9a-f]{40}$'

          violations=()
          files_checked=0

          # Check all handoff docs (not just PR-touched ones — a bad format in any
          # file is a signal; PR-touched ones are the primary scope but a global
          # sweep is cheap and catches drift).
          for f in "${HANDOFFS_DIR}"/*.md; do
            [ -f "${f}" ] || continue
            files_checked=$((files_checked + 1))
            lineno=0
            while IFS= read -r line; do
              lineno=$((lineno + 1))
              # Is this a potential verdict heading?
              if echo "${line}" | grep -qE '^### Wave-[0-9]{1,4}[^0-9].*\b(PASS|REVISE|FAIL) verdict\b'; then
                # Extract wave number
                wave_num=$(echo "${line}" | grep -oE 'Wave-[0-9]{1,4}' | head -1 | grep -oE '[0-9]{1,4}')
                if [ -z "${wave_num}" ]; then
                  continue
                fi
                if [ "${wave_num}" -lt "${FORMAT_REQUIRED_FROM_WAVE}" ]; then
                  # Pre-111: grandfathered, skip
                  continue
                fi
                # Wave >= 111: must match canonical regex
                if ! echo "${line}" | grep -qE "${CANONICAL_PATTERN}"; then
                  violations+=("${f}:${lineno}: ${line}")
                fi
              fi
            done < "${f}"
          done

          echo "Files checked: ${files_checked}"
          echo ""

          if [ "${#violations[@]}" -gt 0 ]; then
            echo "FAIL: ${#violations[@]} Wave-${FORMAT_REQUIRED_FROM_WAVE}+ verdict heading(s) do not match ADR-018 canonical format."
            echo ""
            echo "Canonical format:"
            echo "  ### Wave-NNN PASS verdict — PR #N — SHA <40-char-lowercase-hex>"
            echo "  (em-dash separators are U+2014 — not a hyphen or en-dash)"
            echo ""
            echo "Offending lines:"
            for v in "${violations[@]}"; do
              echo "  ${v}"
            done
            echo ""
            echo "Spec: architecture/decisions/ADR-018-pass-verdict-format.md"
            exit 1
          fi

          echo "OK: All Wave-${FORMAT_REQUIRED_FROM_WAVE}+ verdict headings match ADR-018 canonical format."

  placeholder-ttl-check:
    name: "ADR-018 — placeholder TTL check (all triggers)"
    runs-on: ubuntu-latest
    # Runs on pull_request, push to main, and schedule. No PR context needed.
    # Soft-fail semantics: always exits 0 even when overdue placeholders found.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Install gh CLI (already present on ubuntu-latest; verify)"
        run: gh --version

      - name: "ADR-018 placeholder TTL check (PR #0 on merged PRs > 1h)"
        env:
          GH_TOKEN: ${{ github.token }}
          GRACE_SECONDS: "3600"
          HANDOFFS_DIR: "coordination/handoffs"
        run: |
          set -euo pipefail

          # Soft-fail: emit a warning when PR #0 placeholders exist for PRs that
          # have been merged for > 1 hour. Pre-merge placeholders are expected;
          # this catches missed post-merge backfills.
          #
          # Logic lives in scripts/check-placeholder-ttl.py (extracted Wave 112,
          # #390) — separately testable and free of YAML heredoc escape hazards.
          #
          # On push/schedule events there is no PR context — gh pr list still
          # works because it queries the repo (not the current event) and the
          # script reads coordination/handoffs/*.md from the checked-out tree.

          export NOW_EPOCH
          NOW_EPOCH=$(date +%s)

          # gh outputs [] if the list is empty (no merged PRs) — pipe directly.
          # Allow the gh call to fail gracefully (no network = empty list).
          if ! gh pr list \
                --repo "${{ github.repository }}" \
                --state merged \
                --limit 20 \
                --json number,mergedAt,mergeCommit \
                2>/dev/null \
              | python3 scripts/check-placeholder-ttl.py; then
            echo ""
            echo "WARNING: One or more PR #0 verdict placeholders are overdue for backfill."
            echo "This is a soft warning — the check exits 0. DevSecOps should backfill."
            echo "See ADR-018 Wave 111b amendment: architecture/decisions/ADR-018-pass-verdict-format.md"
            # Soft fail: exit 0 (warning only, not a hard block) — AC3
          fi
